services:
  - type: web
    name: argus-agent-api
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ARGUS_API_KEY
        generateValue: true
    healthCheckPath: /health
    plan: free
