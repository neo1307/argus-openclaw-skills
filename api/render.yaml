services:
  - type: web
    name: argus-agent-api
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ARGUS_API_KEY
        generateValue: true
    healthCheckPath: /health
    plan: free
